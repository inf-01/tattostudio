<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Tatto Studio</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="admin-wrapper">
        <header>
            <div class="title-card">
                <h1><i class="fa-solid fa-database"></i> Panel Tatto Studio</h1>
            </div>
            <button id="logoutBtn" class="logout-btn">
                <i class="fa-solid fa-power-off"></i> Salir
            </button>
        </header>

        <section class="dashboard-container">
            <div class="controls">
                <h3>Últimos Registros</h3>
                <button id="refreshBtn" class="refresh-btn">
                    <i class="fa-solid fa-rotate-right"></i> Actualizar
                </button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>WhatsApp</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable">
                        <!-- Mock de datos iniciales basado en la imagen -->
                        <tr class="data-row">
                            <td>28/02/2026 11:31:45</td>
                            <td>Jose Ruiz</td>
                            <td>waylama36@gmail.com</td>
                            <td></td>
                        </tr>
                        <tr class="data-row">
                            <td>28/02/2026 11:41:26</td>
                            <td>Jose Ruiz G.</td>
                            <td>joseruizgarcia@proton.me</td>
                            <td></td>
                        </tr>
                        <tr class="data-row">
                            <td>28/02/2026 12:28:07</td>
                            <td>Jose Roberto Ruiz García</td>
                            <td></td>
                            <td>50672057795</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="loader-container" id="loader" style="display: none;">
                <div class="pulse-loader"><i class="fa-solid fa-cloud-arrow-down fa-bounce"></i> Sincronizando BD...
                </div>
            </div>
        </section>
    </div>

    <script src="js/admin.js"></script>
</body>

</html>
