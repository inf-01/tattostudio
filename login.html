<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tatto Studio</title>
    <link rel="stylesheet" href="css/login.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="login-wrapper">
        <div class="login-card">
            <h1 class="login-header">
                <i class="fa-solid fa-user-shield"></i>
                LOGIN <span class="heart-icon"><i class="fa-solid fa-heart"></i></span>
            </h1>
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="username" class="form-control" placeholder="Username" required>
                    <i class="fa-solid fa-user icon-input"></i>
                </div>
                <div class="form-group">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                    <i class="fa-solid fa-lock icon-input"></i>
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">Ingresar</button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
